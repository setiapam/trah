<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#451a03"/>
      <stop offset="50%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#451a03"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top gold border -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Bottom gold border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>

  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="80" fill="none" stroke="#d97706" stroke-width="1" opacity="0.15"/>
  <circle cx="160" cy="130" r="60" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>
  <circle cx="1050" cy="500" r="100" fill="none" stroke="#d97706" stroke-width="1" opacity="0.15"/>
  <circle cx="1060" cy="510" r="75" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.1"/>

  <!-- Diamond ornament top -->
  <text x="600" y="180" text-anchor="middle" font-size="14" fill="#d97706" opacity="0.6">&#9670; &#9670; &#9670;</text>

  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="96" font-weight="bold" fill="url(#goldV)">Trah</text>

  <!-- Tagline -->
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="28" font-style="italic" fill="#fde68a" opacity="0.9">Nguri-uri Trah, Njaga Sejarah</text>

  <!-- Divider -->
  <line x1="480" y1="380" x2="600" y2="380" stroke="#d97706" stroke-width="1" opacity="0.5"/>
  <text x="600" y="385" text-anchor="middle" font-size="12" fill="#d97706" opacity="0.5">&#9670;</text>
  <line x1="600" y1="380" x2="720" y2="380" stroke="#d97706" stroke-width="1" opacity="0.5"/>

  <!-- Description -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#d6d3d1">Aplikasi Silsilah Keluarga Digital Indonesia</text>
  <text x="600" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#a8a29e">Simpan, kelola, dan visualisasikan pohon keluarga Anda</text>

  <!-- URL -->
  <text x="600" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#d97706" opacity="0.7">trah.murphi.my.id</text>
</svg>
