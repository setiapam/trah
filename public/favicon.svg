<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0a00"/>
      <stop offset="100%" stop-color="#2d1200"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="40%" stop-color="#d97706"/>
      <stop offset="70%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <!-- Kawung petal clip -->
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Top gold border ornament -->
  <rect x="0" y="0" width="512" height="6" rx="3" fill="url(#goldBorder)" clip-path="url(#roundRect)"/>

  <!-- Kawung motif pattern (4 petals in diamond) — subtle background -->
  <!-- Center kawung -->
  <g opacity="0.12" stroke="#d97706" stroke-width="2.5" fill="none">
    <!-- Top petal -->
    <ellipse cx="256" cy="170" rx="52" ry="52"/>
    <!-- Bottom petal -->
    <ellipse cx="256" cy="342" rx="52" ry="52"/>
    <!-- Left petal -->
    <ellipse cx="170" cy="256" rx="52" ry="52"/>
    <!-- Right petal -->
    <ellipse cx="342" cy="256" rx="52" ry="52"/>
  </g>

  <!-- Inner kawung (smaller, more subtle) -->
  <g opacity="0.07" stroke="#fbbf24" stroke-width="1.5" fill="none">
    <ellipse cx="256" cy="190" rx="32" ry="32"/>
    <ellipse cx="256" cy="322" rx="32" ry="32"/>
    <ellipse cx="190" cy="256" rx="32" ry="32"/>
    <ellipse cx="322" cy="256" rx="32" ry="32"/>
  </g>

  <!-- Corner kawung petals (decorative) -->
  <g opacity="0.06" stroke="#d97706" stroke-width="1.5" fill="none">
    <!-- Top-left -->
    <ellipse cx="100" cy="100" rx="36" ry="36"/>
    <!-- Top-right -->
    <ellipse cx="412" cy="100" rx="36" ry="36"/>
    <!-- Bottom-left -->
    <ellipse cx="100" cy="412" rx="36" ry="36"/>
    <!-- Bottom-right -->
    <ellipse cx="412" cy="412" rx="36" ry="36"/>
  </g>

  <!-- Diamond ornament above T -->
  <path d="M256 108 L264 120 L256 132 L248 120 Z" fill="#d97706" opacity="0.5"/>
  <path d="M224 120 L228 126 L224 132 L220 126 Z" fill="#d97706" opacity="0.25"/>
  <path d="M288 120 L292 126 L288 132 L284 126 Z" fill="#d97706" opacity="0.25"/>

  <!-- Main letter T with serif style -->
  <text x="256" y="370" font-family="Georgia, 'Playfair Display', 'Times New Roman', serif" font-size="280" font-weight="bold" text-anchor="middle" fill="url(#gold)" letter-spacing="-8">T</text>

  <!-- Bottom ornamental line -->
  <line x1="160" y1="410" x2="352" y2="410" stroke="url(#goldBorder)" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M256 404 L262 412 L256 420 L250 412 Z" fill="#d97706" opacity="0.35"/>
</svg>
